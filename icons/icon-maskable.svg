<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b35a"/>
      <stop offset="100%" stop-color="#a8872e"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0c46a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background for maskable safe zone -->
  <rect width="512" height="512" fill="#0c0c0e"/>
  <g transform="translate(256,240)">
    <!-- Shadow -->
    <ellipse cx="0" cy="86" rx="70" ry="12" fill="#000" opacity="0.3"/>
    <!-- Barrel body -->
    <rect x="-66" y="-66" width="132" height="132" rx="10" fill="url(#g1)"/>
    <!-- Top ellipse -->
    <ellipse cx="0" cy="-66" rx="66" ry="17" fill="url(#g2)"/>
    <!-- Barrel opening -->
    <ellipse cx="0" cy="-66" rx="46" ry="12" fill="#1a1a1e"/>
    <ellipse cx="0" cy="-68" rx="36" ry="9" fill="#111" opacity="0.6"/>
    <!-- Oil surface -->
    <ellipse cx="0" cy="-69" rx="28" ry="6" fill="#0c0c0e"/>
    <!-- Bottom ellipse -->
    <ellipse cx="0" cy="66" rx="66" ry="17" fill="#8b6f24"/>
    <!-- Barrel bands -->
    <rect x="-70" y="-38" width="140" height="6" rx="3" fill="#8b6f24" opacity="0.8"/>
    <rect x="-70" y="30" width="140" height="6" rx="3" fill="#8b6f24" opacity="0.8"/>
    <!-- Rivets -->
    <circle cx="-62" cy="-35" r="2.8" fill="#a8872e"/>
    <circle cx="62" cy="-35" r="2.8" fill="#a8872e"/>
    <circle cx="-62" cy="33" r="2.8" fill="#a8872e"/>
    <circle cx="62" cy="33" r="2.8" fill="#a8872e"/>
    <!-- OIL text -->
    <text x="0" y="8" text-anchor="middle" font-family="'Courier New',monospace" font-weight="900" font-size="46" fill="#0c0c0e" letter-spacing="10" opacity="0.85">OIL</text>
  </g>
</svg>
