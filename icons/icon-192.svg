<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b35a"/>
      <stop offset="100%" stop-color="#a8872e"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0c46a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#141418"/>
      <stop offset="100%" stop-color="#0c0c0e"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Subtle ring -->
  <circle cx="96" cy="92" r="70" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.15"/>
  <g transform="translate(96,92)">
    <!-- Shadow -->
    <ellipse cx="0" cy="42" rx="34" ry="6" fill="#000" opacity="0.3"/>
    <!-- Barrel body -->
    <rect x="-32" y="-32" width="64" height="64" rx="5" fill="url(#g1)"/>
    <!-- Top ellipse -->
    <ellipse cx="0" cy="-32" rx="32" ry="8" fill="url(#g2)"/>
    <!-- Barrel opening -->
    <ellipse cx="0" cy="-32" rx="22" ry="5.5" fill="#1a1a1e"/>
    <ellipse cx="0" cy="-33" rx="18" ry="4" fill="#111" opacity="0.6"/>
    <!-- Oil surface shimmer -->
    <ellipse cx="0" cy="-33" rx="14" ry="3" fill="#0c0c0e"/>
    <ellipse cx="-3" cy="-34" rx="6" ry="1.5" fill="#1a1a1e" opacity="0.7"/>
    <!-- Bottom ellipse -->
    <ellipse cx="0" cy="32" rx="32" ry="8" fill="#8b6f24"/>
    <!-- Barrel bands -->
    <rect x="-34" y="-18" width="68" height="4" rx="2" fill="#8b6f24" opacity="0.8"/>
    <rect x="-34" y="14" width="68" height="4" rx="2" fill="#8b6f24" opacity="0.8"/>
    <!-- Rivets -->
    <circle cx="-30" cy="-16" r="1.5" fill="#a8872e"/>
    <circle cx="30" cy="-16" r="1.5" fill="#a8872e"/>
    <circle cx="-30" cy="16" r="1.5" fill="#a8872e"/>
    <circle cx="30" cy="16" r="1.5" fill="#a8872e"/>
    <!-- OIL text -->
    <text x="0" y="4" text-anchor="middle" font-family="'Courier New',monospace" font-weight="900" font-size="22" fill="#0c0c0e" letter-spacing="5" opacity="0.85">OIL</text>
  </g>
  <!-- Brand text -->
  <text x="96" y="156" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#c9a84c" letter-spacing="3" opacity="0.6">BENCHMARKS</text>
</svg>
