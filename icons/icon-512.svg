<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b35a"/>
      <stop offset="100%" stop-color="#a8872e"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0c46a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#141418"/>
      <stop offset="100%" stop-color="#0c0c0e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle ring -->
  <circle cx="256" cy="240" r="180" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.12"/>
  <circle cx="256" cy="240" r="160" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.08"/>
  <g transform="translate(256,240)" filter="url(#shadow)">
    <!-- Shadow -->
    <ellipse cx="0" cy="108" rx="88" ry="16" fill="#000" opacity="0.35"/>
    <!-- Barrel body -->
    <rect x="-84" y="-84" width="168" height="168" rx="12" fill="url(#g1)"/>
    <!-- Top ellipse -->
    <ellipse cx="0" cy="-84" rx="84" ry="22" fill="url(#g2)"/>
    <!-- Barrel opening -->
    <ellipse cx="0" cy="-84" rx="58" ry="15" fill="#1a1a1e"/>
    <ellipse cx="0" cy="-86" rx="46" ry="11" fill="#111" opacity="0.6"/>
    <!-- Oil surface -->
    <ellipse cx="0" cy="-87" rx="36" ry="8" fill="#0c0c0e"/>
    <ellipse cx="-8" cy="-89" rx="16" ry="4" fill="#1a1a1e" opacity="0.6"/>
    <!-- Bottom ellipse -->
    <ellipse cx="0" cy="84" rx="84" ry="22" fill="#8b6f24"/>
    <!-- Barrel bands -->
    <rect x="-90" y="-48" width="180" height="8" rx="4" fill="#8b6f24" opacity="0.8"/>
    <rect x="-90" y="38" width="180" height="8" rx="4" fill="#8b6f24" opacity="0.8"/>
    <!-- Rivets -->
    <circle cx="-78" cy="-44" r="3.5" fill="#a8872e"/>
    <circle cx="78" cy="-44" r="3.5" fill="#a8872e"/>
    <circle cx="-78" cy="42" r="3.5" fill="#a8872e"/>
    <circle cx="78" cy="42" r="3.5" fill="#a8872e"/>
    <!-- Vertical seam lines -->
    <line x1="-42" y1="-84" x2="-42" y2="84" stroke="#8b6f24" stroke-width="1" opacity="0.3"/>
    <line x1="42" y1="-84" x2="42" y2="84" stroke="#8b6f24" stroke-width="1" opacity="0.3"/>
    <!-- OIL text -->
    <text x="0" y="10" text-anchor="middle" font-family="'Courier New',monospace" font-weight="900" font-size="58" fill="#0c0c0e" letter-spacing="12" opacity="0.85">OIL</text>
  </g>
  <!-- Brand text -->
  <text x="256" y="410" text-anchor="middle" font-family="'Courier New',monospace" font-size="24" font-weight="700" fill="#c9a84c" letter-spacing="8" opacity="0.5">BENCHMARKS</text>
</svg>
